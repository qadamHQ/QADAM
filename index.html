<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Qadam — Дисциплин + заработок до 100₸/день</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto; }
    body { background: #0a0a0c; color: #eee; padding: 16px; transition: background 0.2s, color 0.2s; }
    body.light { background: #f0f0f0; color: #111; }
    body.light .card { background: rgba(255,255,255,0.95); border-color: #ff9900; color: #111; }
    body.light input, body.light select, body.light textarea { background: #fff; color: #111; border-color: #ccc; }
    body.light .btn { background: #e0e0e0; color: #111; }
    body.light .task-item { background: #f5f5f5; }
    .container { max-width: 700px; margin: 0 auto; }
    .card { background: rgba(24,24,28,0.95); border-radius: 28px; padding: 18px; margin-bottom: 16px; border: 1px solid rgba(255,153,0,0.3); }
    h1 { font-size: 1.8rem; background: linear-gradient(135deg,#ffb347,#ff9900); -webkit-background-clip: text; background-clip: text; color: transparent; display: inline-block; }
    .btn { background: #2c2c32; border: none; color: white; padding: 10px 16px; border-radius: 60px; font-weight: bold; cursor: pointer; margin: 4px 0; }
    .btn-primary { background: #ff9900; color: #0a0a0c; }
    input, select, textarea { background: #1e1e24; border: 1px solid #3a3a40; border-radius: 28px; padding: 12px; color: white; width: 100%; margin-bottom: 12px; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
    .streak-bar { background: #222; border-radius: 40px; height: 12px; overflow: hidden; margin: 12px 0; }
    .streak-fill { width: 0%; height: 100%; background: linear-gradient(90deg,#ff9900,#ffcd4a); transition: width 0.5s; }
    .task-item { background: #131316; border-radius: 24px; padding: 14px; margin: 12px 0; border-left: 4px solid #ff9900; }
    .task-item.completed { border-left-color: #2ecc71; background: #1a1f1a; }
    .task-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .task-photos { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .task-photo { width: 60px; height: 60px; object-fit: cover; border-radius: 12px; cursor: pointer; }
    .verification-badge { background: #e67e22; padding: 4px 8px; border-radius: 20px; font-size: 11px; }
    .badge { background: #ff9900; color: #000; padding: 4px 12px; border-radius: 60px; font-weight: bold; font-size: 0.75rem; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #ff9900; color: #000; padding: 12px 24px; border-radius: 60px; z-index: 999; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    .photo-upload { margin-top: 10px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .settings-icon { font-size: 1.8rem; cursor: pointer; background: none; border: none; padding: 0 10px; color: #ff9900; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
    .modal-content { background: #1e1e24; border-radius: 28px; padding: 20px; width: 90%; max-width: 400px; }
    body.light .modal-content { background: #fff; }
    .close-btn { float: right; font-size: 24px; cursor: pointer; }
  </style>
</head>
<body>
<div class="container">
  <!-- Экран авторизации -->
  <div id="authScreen" class="card" style="text-align: center;">
    <h1>QADAM</h1>
    <p style="margin: 16px 0;">Дисциплина + заработок до 100 ₸/день</p>
    <div id="authTabs" class="flex-between" style="margin-bottom: 20px;">
      <button id="loginTabBtn" class="btn btn-primary" style="flex:1;">Вход</button>
      <button id="registerTabBtn" class="btn" style="flex:1;">Регистрация</button>
    </div>
    <div id="loginPanel">
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Пароль">
      <button id="doLoginBtn" class="btn btn-primary">Войти</button>
    </div>
    <div id="registerPanel" style="display: none;">
      <input type="text" id="regNick" placeholder="Ник (буквы/цифры/_, 3-20 символов)">
      <input type="email" id="regEmail" placeholder="Email">
      <input type="password" id="regPassword" placeholder="Пароль">
      <div style="font-size: 12px;">⚠️ Сохрани пароль!</div>
      <button id="doRegisterBtn" class="btn btn-primary">Создать аккаунт</button>
    </div>
  </div>

  <!-- Главный экран -->
  <div id="mainApp" style="display: none;">
    <div class="flex-between">
      <div style="display: flex; align-items: center; gap: 8px;">
        <button id="settingsBtn" class="settings-icon">⚙️</button>
        <h1>QADAM</h1>
      </div>
      <div><span class="badge" id="premiumBadge">⚡ Обычный</span> <span class="badge" id="balanceBadge">💰 0 ₸</span></div>
    </div>
    <div class="card">
      <div class="flex-between"><span>🔥 Серия: <strong id="streakDays">0</strong></span><span>🏆 Лучшая: <strong id="bestStreak">0</strong></span></div>
      <div class="streak-bar"><div class="streak-fill" id="streakFill"></div></div>
      <div class="flex-between"><span>🎯 <span id="goalLabel"></span></span><span>😊 <span id="moodLabel"></span></span></div>
    </div>

    <div class="card">
      <div class="flex-between"><h3>📋 Задачи дня</h3><button id="refreshTasksBtn" class="btn">🔄</button></div>
      <div id="tasksList"></div>
      <div style="font-size:13px; margin-top:8px;">⭐ За все задачи +100 ₸</div>
    </div>

    <div class="card">
      <h3>✍️ Мысли</h3>
      <textarea id="thoughtInput" rows="2" placeholder="Что чувствуешь?"></textarea>
      <button id="getAdviceBtn" class="btn btn-primary">Получить совет</button>
      <div id="adviceOutput" class="card" style="margin-top: 8px; display: none;"></div>
    </div>

    <div class="card">
      <h3>💸 Кошелёк</h3>
      <p>Баланс: <strong id="walletBalance">0</strong> ₸</p>
      <button id="buyPremiumBtn" class="btn btn-primary">Premium за 1000 ₸ (неделя)</button>
      <button id="trialPremiumBtn" class="btn">Пробная версия 3 дня</button>
      <button id="withdrawBtn" class="btn">📤 Запросить вывод (от 5000 ₸)</button>
      <button id="kaspiPayBtn" class="btn" style="background:#0066b3;">💳 Пополнить Kaspi Pay</button>
    </div>

    <div class="card">
      <h3>📜 История</h3>
      <div id="historyList">—</div>
    </div>
  </div>
</div>

<!-- Модальное окно настроек -->
<div id="settingsModal" class="modal">
  <div class="modal-content">
    <span class="close-btn">&times;</span>
    <h3>⚙️ Настройки</h3>
    <p><strong>🆔 Ваш ID:</strong> <span id="userIdNumber">—</span></p>
    <input type="text" id="changeNickInput" placeholder="Новый ник">
    <button id="changeNickBtn" class="btn btn-primary">Сменить ник</button>
    <input type="password" id="oldPasswordInput" placeholder="Старый пароль">
    <input type="password" id="newPasswordInput" placeholder="Новый пароль">
    <button id="changePasswordBtn" class="btn btn-primary">Сменить пароль</button>
    <select id="themeSelect">
      <option value="dark">🌙 Тёмная тема</option>
      <option value="light">☀️ Светлая тема</option>
    </select>
    <button id="logoutSettingsBtn" class="btn" style="background:#a00; margin-top:12px;">🚪 Выйти</button>
  </div>
</div>

<script>
  // ========== НАСТРОЙКИ SUPABASE ==========
  const SUPABASE_URL = "https://sebsaslqngrvjsywtrjz.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlYnNhc2xqbmdydmpzeXd0cmp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NzIwMjEsImV4cCI6MjA5MTI0ODAyMX0.tka6zqyCwhR10pGPul-9H6e57CO18Rk4BEda1YLHUj8";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let userData = null;

  // ========== ГЕНЕРАТОР ЗАДАЧ ==========
  const taskPools = {
    discipline: ["Сделай {count} отжиманий","Прочитай {count} страниц","Помедитируй {minutes} мин","Заправь кровать","План на день из {count} пунктов","Час без телефона","Зарядка: {exercise}","Выучи {count} слов","Убери на столе","Прогулка {minutes} мин"],
    money: ["Изучи {count} терминов","Отправь резюме","Просмотри бюджет","Карьерная задача","Курс {minutes} мин","Новый контакт","Запиши траты","Идея для подработки","Навык: {skill}","Список целей"],
    apathy: ["Доброе дело","Выйди на улицу {minutes} мин","Одно достижение","Уборка {minutes} мин","Свяжись с другом","Микрозадача: {micro}","Музыка {minutes} мин","5 вдохов","Благодарность","Стакан воды"]
  };
  const exercises = ["приседания","планка","пресс","йога"];
  const skills = ["Excel","Python","Английский"];
  const micros = ["выбросить мусор","помыть чашку","растяжка"];

  function getDailyTasks(goal, difficulty, streak, mood) {
    let templates = taskPools[goal] || taskPools.discipline;
    let count = mood === "motivation" ? 4 : (mood === "empty" ? 2 : 3);
    let tasks = [];
    for (let i=0; i<count; i++) {
      let tmpl = templates[i % templates.length];
      let task = tmpl.replace("{count}", (Math.floor(Math.random()*20)+5))
                     .replace("{minutes}", (Math.floor(Math.random()*30)+5))
                     .replace("{exercise}", exercises[Math.floor(Math.random()*exercises.length)])
                     .replace("{skill}", skills[Math.floor(Math.random()*skills.length)])
                     .replace("{micro}", micros[Math.floor(Math.random()*micros.length)]);
      tasks.push(task);
    }
    if (streak >= 5) tasks = tasks.map(t => "⭐ " + t);
    if (streak === 0) tasks = tasks.map(t => "🌀 " + t);
    if (difficulty === "hard") tasks = tasks.map(t => "🔥 " + t);
    if (difficulty === "soft") tasks = tasks.map(t => "🌿 " + t);
    return tasks;
  }

  // ========== РАБОТА С БАЗОЙ ==========
  async function updateUserData(updates) {
    await supabase.from('users').update(updates).eq('id', currentUser.id);
    if (userData) Object.assign(userData, updates);
  }

  async function loadUserData() {
    let { data, error } = await supabase.from('users').select('*').eq('id', currentUser.id).single();
    if (error && error.code !== 'PGRST116') { console.error(error); return; }
    if (data) {
      userData = data;
      if (typeof userData.daily_tasks === 'string') userData.daily_tasks = JSON.parse(userData.daily_tasks);
      if (!userData.daily_tasks) userData.daily_tasks = [];
      if (!userData.completed_tasks) userData.completed_tasks = [];
      if (!userData.history) userData.history = [];
    } else {
      // Получаем следующий ID
      let { data: counterData } = await supabase.from('counter').select('last_id').single();
      let newId = counterData ? counterData.last_id + 1 : 1;
      if (currentUser.email === 'assakill799@gmail.com') newId = 0;
      await supabase.from('counter').upsert({ id: 1, last_id: newId });
      const userIdNumber = String(newId).padStart(5, '0');
      
      userData = {
        id: currentUser.id, 
        nickname: currentUser.user_metadata?.nickname || currentUser.email.split('@')[0], 
        balance: 0, streak: 0, best_streak: 0, premium_until: 0, 
        goal: 'discipline', mood: 'normal', difficulty: 'normal', 
        history: [], last_date: null, daily_tasks: [], completed_tasks: [], 
        verification: null, user_number: userIdNumber, theme: 'dark'
      };
      await supabase.from('users').insert(userData);
    }
    if (userData.theme === 'light') document.body.classList.add('light');
    else document.body.classList.remove('light');
    document.getElementById('themeSelect').value = userData.theme || 'dark';
    renderDashboard();
  }

  async function checkNewDay() {
    const today = new Date().toISOString().slice(0,10);
    if (!userData.last_date) { userData.last_date = today; return; }
    if (userData.last_date === today) return;
    let penalty = 0;
    if (userData.completed_tasks.length !== userData.daily_tasks.length && userData.daily_tasks.length > 0) {
      if (userData.difficulty === 'hard') penalty = 3;
      else if (userData.difficulty === 'normal') penalty = 1;
      else penalty = 0.5;
      penalty = Math.min(penalty, userData.streak);
      if (penalty > 0) addHistory(`❌ Штраф: -${Math.floor(penalty)} дней`);
    }
    if (penalty > 0) userData.streak = Math.max(0, userData.streak - Math.floor(penalty));
    userData.last_date = today;
    userData.completed_tasks = [];
    userData.daily_tasks = getDailyTasks(userData.goal, userData.difficulty, userData.streak, userData.mood);
    if (Math.floor(Date.now() / 86400000) % 3 === 0 && userData.daily_tasks.length > 0) {
      let randIdx = Math.floor(Math.random() * userData.daily_tasks.length);
      userData.verification = { taskIndex: randIdx, photoRequired: true };
      addHistory(`🔍 Проверка: фото для "${userData.daily_tasks[randIdx]}"`);
    } else userData.verification = null;
    await updateUserData({ streak: userData.streak, last_date: userData.last_date, completed_tasks: [], daily_tasks: userData.daily_tasks, verification: userData.verification });
    renderDashboard();
  }

  async function completeTask(idx) {
    if (userData.completed_tasks.includes(idx)) return;
    let needPhoto = userData.verification && userData.verification.taskIndex === idx;
    if (needPhoto) {
      let { data: photos } = await supabase.from('task_photos').select('photo_url').eq('user_id', currentUser.id).eq('task_index', idx);
      if (!photos || photos.length === 0) { alert("⚠️ Сначала загрузи фото к этой задаче!"); return; }
    }
    userData.completed_tasks.push(idx);
    let allDone = userData.completed_tasks.length === userData.daily_tasks.length;
    if (allDone) {
      userData.balance += 100;
      userData.streak += 1;
      if (userData.streak > userData.best_streak) userData.best_streak = userData.streak;
      addHistory(`✅ +100 ₸! Серия ${userData.streak}`);
      if (userData.streak % 3 === 0) {
        alert("🎁 БОНУС! 3 дня подряд!");
        addHistory(`🎁 Бонус за серию ${userData.streak}`);
      }
      await updateUserData({ balance: userData.balance, streak: userData.streak, best_streak: userData.best_streak, completed_tasks: userData.completed_tasks });
      if (userData.verification) await updateUserData({ verification: null });
    } else {
      await updateUserData({ completed_tasks: userData.completed_tasks });
    }
    renderDashboard();
  }

  async function uploadPhoto(taskIdx, file) {
    if (!file) return;
    let fileName = `${Date.now()}_${file.name}`;
    let filePath = `${currentUser.id}/${taskIdx}/${fileName}`;
    let { error } = await supabase.storage.from('task_photos').upload(filePath, file);
    if (error) { alert("Ошибка: " + error.message); return; }
    let { data: urlData } = supabase.storage.from('task_photos').getPublicUrl(filePath);
    await supabase.from('task_photos').insert({ user_id: currentUser.id, task_index: taskIdx, photo_url: urlData.publicUrl });
    alert("✅ Фото загружено!");
    renderDashboard();
  }

  async function deletePhoto(photoUrl, taskIdx) {
    let pathPart = photoUrl.split('/').slice(-3).join('/');
    await supabase.storage.from('task_photos').remove([pathPart]);
    await supabase.from('task_photos').delete().eq('user_id', currentUser.id).eq('task_index', taskIdx).eq('photo_url', photoUrl);
    renderDashboard();
  }

  async function getPhotos(taskIdx) {
    let { data } = await supabase.from('task_photos').select('photo_url').eq('user_id', currentUser.id).eq('task_index', taskIdx);
    return data || [];
  }

  function addHistory(text) {
    userData.history.unshift({ time: new Date().toLocaleString(), text });
    if (userData.history.length > 30) userData.history.pop();
    updateUserData({ history: userData.history });
    renderHistory();
  }

  async function renderDashboard() {
    if (!userData) return;
    document.getElementById('streakDays').innerText = userData.streak;
    document.getElementById('bestStreak').innerText = userData.best_streak;
    let percent = Math.min(100, (userData.streak/(userData.streak+7))*100);
    document.getElementById('streakFill').style.width = percent+'%';
    document.getElementById('goalLabel').innerText = {discipline:'Дисциплина',money:'Карьера',apathy:'Апатия'}[userData.goal];
    document.getElementById('moodLabel').innerText = {empty:'Пусто',normal:'Норм',anger:'Злость',motivation:'Мощь'}[userData.mood];
    document.getElementById('walletBalance').innerText = userData.balance;
    let premiumActive = userData.premium_until > Date.now();
    document.getElementById('premiumBadge').innerHTML = premiumActive ? '👑 Premium' : '⚡ Обычный';
    
    let tasksHtml = '';
    for (let i=0; i<userData.daily_tasks.length; i++) {
      let task = userData.daily_tasks[i];
      let done = userData.completed_tasks.includes(i);
      let needVerify = userData.verification && userData.verification.taskIndex === i;
      let photos = await getPhotos(i);
      tasksHtml += `<div class="task-item ${done?'completed':''}">
        <div class="task-header">
          <span style="${done?'text-decoration:line-through;opacity:0.7':''}">${task}</span>
          ${needVerify ? '<span class="verification-badge">📸 Фото обязательно</span>' : ''}
          <button class="completeBtn" data-idx="${i}" ${done ? 'disabled' : ''}>✅</button>
        </div>
        <div class="task-photos">` + photos.map(p => `<img src="${p.photo_url}" class="task-photo" onclick="window.open('${p.photo_url}')"><button class="delete-photo-btn" data-url="${p.photo_url}" data-idx="${i}">🗑️</button>`).join('') + `</div>
        <div class="photo-upload">
          <input type="file" id="fileInput_${i}" accept="image/*" style="display:inline-block; width:auto;">
          <button class="uploadBtn" data-idx="${i}">📸 Загрузить фото</button>
        </div>
      </div>`;
    }
    document.getElementById('tasksList').innerHTML = tasksHtml;
    document.querySelectorAll('.completeBtn').forEach(btn => btn.onclick = () => completeTask(parseInt(btn.dataset.idx)));
    document.querySelectorAll('.uploadBtn').forEach(btn => {
      btn.onclick = () => {
        let idx = parseInt(btn.dataset.idx);
        let fileInput = document.getElementById(`fileInput_${idx}`);
        if (fileInput.files.length) uploadPhoto(idx, fileInput.files[0]);
        else alert("Выберите фото");
      };
    });
    document.querySelectorAll('.delete-photo-btn').forEach(btn => {
      btn.onclick = () => deletePhoto(btn.dataset.url, parseInt(btn.dataset.idx));
    });
    renderHistory();
  }

  function renderHistory() {
    let html = (userData.history || []).slice(0,8).map(h => `<div><small>${h.time}</small> ${h.text}</div>`).join('');
    document.getElementById('historyList').innerHTML = html || '—';
  }

  async function getAdvice() {
    let thought = document.getElementById('thoughtInput').value.trim();
    if (!thought) { alert("Напиши что-нибудь"); return; }
    let advice = "Твой путь важен. Сделай маленький шаг.";
    if (thought.includes('лень')) advice = "Начни с 2 минут, и поедет.";
    if (thought.includes('устал')) advice = "Отдых — тоже часть пути. 5 минут тишины.";
    document.getElementById('adviceOutput').innerHTML = `<strong>🧠 Совет:</strong> ${advice}`;
    document.getElementById('adviceOutput').style.display = 'block';
    addHistory(`Рефлексия: ${thought.slice(0,40)}...`);
  }

  async function buyPremium() {
    if (userData.balance >= 1000) {
      userData.balance -= 1000;
      userData.premium_until = Date.now() + 7*24*3600*1000;
      await updateUserData({ balance: userData.balance, premium_until: userData.premium_until });
      alert("Premium на неделю активирован!");
      renderDashboard();
    } else alert("Недостаточно тенге");
  }
  async function trialPremium() {
    if (userData.premium_until > Date.now()) { alert("Уже есть премиум"); return; }
    userData.premium_until = Date.now() + 3*24*3600*1000;
    await updateUserData({ premium_until: userData.premium_until });
    alert("Пробная версия на 3 дня!");
    renderDashboard();
  }
  async function requestWithdraw() {
    if (userData.balance >= 5000) {
      addHistory(`💰 Заявка на вывод ${userData.balance} ₸`);
      alert("Заявка отправлена! Амин свяжется.");
    } else alert("Минимум 5000 ₸");
  }
  function kaspiPay() {
    let amount = prompt("Сумма пополнения (мин 100 ₸):", "1000");
    if (amount && amount>=100) {
      alert(`Перейдите по ссылке для оплаты: https://kaspi.kz/pay?amount=${amount}&description=Qadam`);
    }
  }

  // ========== НАСТРОЙКИ ==========
  const modal = document.getElementById('settingsModal');
  document.getElementById('settingsBtn').onclick = () => {
    document.getElementById('userIdNumber').innerText = userData.user_number || '00000';
    modal.style.display = 'flex';
  };
  document.querySelector('.close-btn').onclick = () => modal.style.display = 'none';
  window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

  document.getElementById('changeNickBtn').onclick = async () => {
    let newNick = document.getElementById('changeNickInput').value.trim();
    if (!newNick.match(/^[a-zA-Z0-9_]{3,20}$/)) { alert("Ник: буквы/цифры/_, 3-20 символов"); return; }
    let { data: existing } = await supabase.from('users').select('id').eq('nickname', newNick);
    if (existing && existing.length > 0 && existing[0].id !== currentUser.id) { alert("Ник уже занят"); return; }
    await updateUserData({ nickname: newNick });
    alert("Ник изменён!");
    modal.style.display = 'none';
    renderDashboard();
  };
  document.getElementById('changePasswordBtn').onclick = async () => {
    let newPass = document.getElementById('newPasswordInput').value;
    if (newPass.length < 6) { alert("Новый пароль должен быть не менее 6 символов"); return; }
    let { error } = await supabase.auth.updateUser({ password: newPass });
    if (error) alert("Ошибка: " + error.message);
    else { alert("Пароль изменён!"); modal.style.display = 'none'; }
  };
  document.getElementById('themeSelect').onchange = async (e) => {
    let theme = e.target.value;
    if (theme === 'light') document.body.classList.add('light');
    else document.body.classList.remove('light');
    await updateUserData({ theme: theme });
  };
  document.getElementById('logoutSettingsBtn').onclick = () => supabase.auth.signOut();

  // ========== АВТОРИЗАЦИЯ ==========
  document.getElementById('loginTabBtn').onclick = () => { 
    document.getElementById('loginPanel').style.display = 'block'; 
    document.getElementById('registerPanel').style.display = 'none'; 
  };
  document.getElementById('registerTabBtn').onclick = () => { 
    document.getElementById('loginPanel').style.display = 'none'; 
    document.getElementById('registerPanel').style.display = 'block'; 
  };
  
  document.getElementById('doLoginBtn').onclick = async () => {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) alert("Ошибка входа: " + error.message);
    else alert("Добро пожаловать!");
  };
  
  document.getElementById('doRegisterBtn').onclick = async () => {
    const nick = document.getElementById('regNick').value.trim();
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    if (!nick.match(/^[a-zA-Z0-9_]{3,20}$/)) { alert("Ник: буквы/цифры/_, 3-20 символов"); return; }
    const { error } = await supabase.auth.signUp({ 
      email, password, 
      options: { data: { nickname: nick } } 
    });
    if (error) alert("Ошибка регистрации: " + error.message);
    else alert("Регистрация успешна! Теперь войдите.");
  };
  
  document.getElementById('getAdviceBtn').onclick = getAdvice;
  document.getElementById('buyPremiumBtn').onclick = buyPremium;
  document.getElementById('trialPremiumBtn').onclick = trialPremium;
  document.getElementById('withdrawBtn').onclick = requestWithdraw;
  document.getElementById('kaspiPayBtn').onclick = kaspiPay;
  document.getElementById('refreshTasksBtn').onclick = async () => { 
    if(userData){ 
      userData.daily_tasks = getDailyTasks(userData.goal, userData.difficulty, userData.streak, userData.mood); 
      userData.completed_tasks=[]; 
      await updateUserData({daily_tasks: userData.daily_tasks, completed_tasks:[]}); 
      renderDashboard(); 
      alert("Задачи обновлены"); 
    } 
  };

  // Слушатель авторизации
  supabase.auth.onAuthStateChange(async (event, session) => {
    if (session) {
      currentUser = session.user;
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      await loadUserData();
      await checkNewDay();
      renderDashboard();
    } else {
      document.getElementById('authScreen').style.display = 'block';
      document.getElementById('mainApp').style.display = 'none';
      currentUser = null;
      userData = null;
    }
  });
</script>
</body>
</html>
